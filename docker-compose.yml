services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: "production"
      NEXT_TELEMETRY_DISABLED: "1"
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      AUTH_TRUST_HOST: "${AUTH_TRUST_HOST:-true}"
      AUTH_URL: "${AUTH_URL:-http://localhost:3000}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-hearth}:${POSTGRES_PASSWORD:-hearth}@postgres:5432/${POSTGRES_DB:-hearth}"
      AUTH_SECRET: "${AUTH_SECRET:-change-me-before-exposing-publicly}"
      DOCUMENT_ENCRYPTION_KEY: "${DOCUMENT_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}"
      CRON_SECRET: "${CRON_SECRET:-change-me-before-exposing-publicly}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-http://localhost:3000}"
      SEED_USER_EMAIL: "${SEED_USER_EMAIL:-admin@hearth.local}"
      SEED_USER_PASSWORD: "${SEED_USER_PASSWORD:-hearth-dev}"
      SEED_USER_NAME: "${SEED_USER_NAME:-Admin}"
      EXTRACTION_PROVIDER: "${EXTRACTION_PROVIDER:-mock}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o}"
      EXTRACTION_MODEL: "${EXTRACTION_MODEL:-}"
      REASONING_MODEL: "${REASONING_MODEL:-}"
      BLOB_READ_WRITE_TOKEN: "${BLOB_READ_WRITE_TOKEN:-}"
    ports:
      - "${APP_PORT:-3000}:3000"
    restart: unless-stopped
    volumes:
      - "${HEARTH_STORAGE_DIR:-/mnt/storagebox/hearth/storage}:/app/storage"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/login').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-hearth}"
      POSTGRES_USER: "${POSTGRES_USER:-hearth}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-hearth}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    volumes:
      - hearth-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hearth} -d ${POSTGRES_DB:-hearth}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  hearth-postgres:
